<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #172033;
      }

      main {
        padding: 3rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 10vw, 6rem);
        letter-spacing: -0.05em;
      }

      p {
        margin: 1rem 0 0;
        color: #526078;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #101522;
          color: #f4f7fb;
        }

        p {
          color: #aeb9cc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, world!</h1>
      <p>GitHub Pages is ready.</p>
    </main>
  </body>
</html>
