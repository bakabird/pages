<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="CXMT 股价、市值与 HL 对应价格及溢价情景分析工具">
    <title>CXMT × HL 估值分析</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f3f5f2;
        color: #18221c;
        font-variant-numeric: tabular-nums;
      }

      * { box-sizing: border-box; }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 96% 0%, rgb(99 135 110 / 13%), transparent 30rem),
          linear-gradient(180deg, #f7f8f5 0, #eef1ec 100%);
      }

      button, input { font: inherit; }

      a { color: inherit; }

      .shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 26px 0 56px;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 36px;
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #5f6d63;
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
      }

      .back:hover { color: #1f6b43; }

      .hero {
        margin-bottom: 30px;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Songti SC", serif;
        font-size: clamp(34px, 5vw, 68px);
        font-weight: 500;
        letter-spacing: -.045em;
        line-height: 1;
      }

      .mode-panel {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 16px;
        padding: 12px;
        border: 1px solid #d5dbd5;
        border-radius: 14px;
        background: rgb(251 252 249 / 96%);
      }

      .mode-toggle {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border-radius: 10px;
        background: #e9ede9;
      }

      .mode-button {
        padding: 9px 14px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: #68746c;
        cursor: pointer;
        font-size: 13px;
        font-weight: 750;
      }

      .mode-button.active {
        background: #fff;
        color: #176c43;
        box-shadow: 0 2px 8px rgb(38 58 45 / 10%);
      }

      .base-control {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: auto;
      }

      .base-control label {
        color: #68746c;
        font-size: 13px;
        font-weight: 700;
      }

      .base-input {
        display: flex;
        align-items: baseline;
        gap: 7px;
        min-width: 210px;
        padding: 9px 12px;
        border: 1px solid #cfd7d0;
        border-radius: 8px;
        background: #fff;
      }

      .base-input:focus-within {
        border-color: #4a8b65;
        box-shadow: 0 0 0 3px rgb(45 125 79 / 10%);
      }

      .base-input input {
        width: 100%;
        min-width: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #16221a;
        font-size: 18px;
        font-weight: 750;
      }

      .parameters {
        display: grid;
        grid-template-columns: repeat(4, minmax(150px, 1fr));
        gap: 1px;
        overflow: hidden;
        margin-bottom: 16px;
        border: 1px solid #d5dbd5;
        border-radius: 14px;
        background: #d5dbd5;
      }

      .parameter {
        position: relative;
        padding: 18px 18px 16px;
        background: rgb(251 252 249 / 96%);
      }

      .parameter label {
        display: block;
        margin-bottom: 10px;
        color: #718078;
        font-size: 12px;
        font-weight: 700;
      }

      .parameter-input {
        display: flex;
        align-items: baseline;
        gap: 7px;
      }

      .parameter input {
        width: 100%;
        min-width: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #16221a;
        font-size: 25px;
        font-weight: 700;
        letter-spacing: -.03em;
      }

      .parameter input:focus { color: #167145; }

      .fixed-value {
        color: #16221a;
        font-size: 25px;
        font-weight: 700;
        letter-spacing: -.03em;
      }

      .unit {
        flex: none;
        color: #89938c;
        font-size: 12px;
      }

      .formulas {
        display: flex;
        gap: 24px;
        margin-top: 16px;
        padding: 12px 4px 0;
        border-top: 1px solid #d9ded9;
      }

      .formula {
        color: #929b94;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.5;
      }

      .formula strong {
        margin-right: 6px;
        color: #77827a;
        font-weight: 650;
      }

      .table-card {
        overflow: hidden;
        border: 1px solid #d3dad3;
        border-radius: 18px;
        background: rgb(255 255 255 / 88%);
        box-shadow: 0 20px 60px rgb(40 58 47 / 7%);
      }

      .table-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 19px 22px;
        border-bottom: 1px solid #dce1dc;
      }

      .table-title {
        margin: 0;
        font-size: 15px;
        font-weight: 780;
      }

      .actions { display: flex; gap: 8px; }

      .button {
        padding: 8px 12px;
        border: 1px solid #ccd4cd;
        border-radius: 8px;
        background: #fff;
        color: #4e5d53;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }

      .button:hover { border-color: #7d9a86; color: #176c43; }

      .table-scroll { overflow-x: auto; }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
      }

      th, td {
        padding: 15px 16px;
        border-bottom: 1px solid #e2e6e2;
        text-align: right;
        vertical-align: middle;
      }

      th {
        background: #f0f2ef;
        color: #69766e;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: .04em;
        text-transform: uppercase;
      }

      th:first-child, td:first-child { padding-left: 22px; text-align: left; }
      th:last-child, td:last-child { padding-right: 22px; }
      tbody tr:last-child td { border-bottom: 0; }
      tbody tr:hover { background: #fafbf8; }

      .scenario {
        color: #26342b;
        font-size: 13px;
        font-weight: 740;
      }

      .metric {
        color: #26342b;
        font-size: 14px;
        font-weight: 650;
      }

      .hl-price { color: #166e43; font-size: 16px; font-weight: 820; }
      .muted { color: #859087; font-weight: 500; }

      .premium-badge {
        display: inline-block;
        min-width: 68px;
        padding: 5px 8px;
        border-radius: 999px;
        background: #edf5ef;
        color: #24704a;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }

      .premium-badge.discount { background: #f9eeee; color: #a04b4b; }

      @media (max-width: 820px) {
        .shell { width: min(100% - 20px, 1440px); padding-top: 18px; }
        .topbar { margin-bottom: 34px; }
        .mode-panel { align-items: stretch; flex-direction: column; }
        .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; }
        .base-control { justify-content: space-between; margin-left: 0; }
        .parameters { grid-template-columns: 1fr 1fr; }
        .formulas { align-items: flex-start; flex-direction: column; gap: 5px; }
      }

      @media (max-width: 520px) {
        .parameters { grid-template-columns: 1fr; }
        .base-control { align-items: stretch; flex-direction: column; gap: 7px; }
        .base-input { min-width: 0; }
        .table-header { align-items: flex-start; flex-direction: column; }
        .actions { width: 100%; flex-wrap: wrap; }
        .button { flex: 1; }
      }

      @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <a class="back" href="../" aria-label="返回页面列表">← 返回 Pages</a>
      </div>

      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title">CXMT × HL</h1>
      </section>

      <section class="mode-panel" aria-label="矩阵模式">
        <div class="mode-toggle" role="group" aria-label="选择矩阵模式">
          <button class="mode-button active" type="button" data-mode="price" aria-pressed="true">按基准 A 股价</button>
          <button class="mode-button" type="button" data-mode="marketCap" aria-pressed="false">按基准市值</button>
        </div>
        <div class="base-control">
          <label id="base-label" for="base-value">基准 A 股价格</label>
          <div class="base-input"><input id="base-value" type="number" value="8.66" min="0" step="0.01"><span class="unit" id="base-unit">CNY</span></div>
        </div>
      </section>

      <section class="parameters" aria-label="模型参数">
        <div class="parameter">
          <label>CXMT 总股本（固定）</label>
          <div class="parameter-input"><span class="fixed-value">668.8</span><span class="unit">亿股</span></div>
        </div>
        <div class="parameter">
          <label for="fx-rate">人民币 / 美元汇率</label>
          <div class="parameter-input"><input id="fx-rate" type="number" value="6.78" min="0.01" step="0.01"><span class="unit">CNY</span></div>
        </div>
        <div class="parameter">
          <label for="hl-premium">HL 全局溢价比例</label>
          <div class="parameter-input"><input id="hl-premium" type="number" value="10" step="1"><span class="unit">%</span></div>
        </div>
        <div class="parameter">
          <label for="hl-current">HL 参考现价（手动）</label>
          <div class="parameter-input"><input id="hl-current" type="number" value="" placeholder="输入现价" min="0" step="0.01"><span class="unit">USD</span></div>
        </div>
      </section>

      <section class="table-card" aria-labelledby="scenario-title">
        <header class="table-header">
          <h2 class="table-title" id="scenario-title">2×–10× 情景矩阵</h2>
          <div class="actions">
            <button class="button" type="button" id="reset">恢复默认</button>
            <button class="button" type="button" id="export">导出 CSV</button>
          </div>
        </header>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th scope="col">倍数</th>
                <th scope="col">CXMT A股价格</th>
                <th scope="col">市值</th>
                <th scope="col">美元市值</th>
                <th scope="col">美元折算价</th>
                <th scope="col">全局溢价</th>
                <th scope="col">HL 对应价</th>
                <th scope="col">现价实际溢价</th>
              </tr>
            </thead>
            <tbody id="scenario-body"></tbody>
          </table>
        </div>
      </section>

      <section class="formulas" aria-label="计算公式">
        <div class="formula" id="matrix-formula"><strong>模式一</strong>情景股价 = 基准 A 股价格 × 2–10 倍</div>
        <div class="formula"><strong>市值计算</strong>A股价格 × 668.8 亿股</div>
        <div class="formula"><strong>HL 对应价</strong>A股价格 ÷ 汇率 ×（1 + 全局溢价）</div>
      </section>

    </main>

    <script>
      const CXMT_SHARES_YI = 668.8;
      const MULTIPLES = Array.from({ length: 9 }, (_, index) => index + 2);
      const DEFAULT_BASE_PRICE = 8.66;
      const DEFAULT_BASE_MARKET_CAP = DEFAULT_BASE_PRICE * CXMT_SHARES_YI / 10000;

      let mode = "price";
      let basePrice = DEFAULT_BASE_PRICE;
      let baseMarketCap = DEFAULT_BASE_MARKET_CAP;

      const body = document.querySelector("#scenario-body");
      const baseInput = document.querySelector("#base-value");
      const baseLabel = document.querySelector("#base-label");
      const baseUnit = document.querySelector("#base-unit");
      const matrixFormula = document.querySelector("#matrix-formula");
      const modeButtons = [...document.querySelectorAll(".mode-button")];
      const inputs = {
        fx: document.querySelector("#fx-rate"),
        premium: document.querySelector("#hl-premium"),
        current: document.querySelector("#hl-current")
      };

      const number = (value, digits) => Number.isFinite(value)
        ? value.toLocaleString("zh-CN", { minimumFractionDigits: digits, maximumFractionDigits: digits })
        : "—";

      const inputNumber = value => Number.isFinite(value) ? String(Number(value.toFixed(7))) : "";

      function scenarios() {
        const base = Number(baseInput.value);
        return MULTIPLES.map(multiple => {
          if (mode === "price") {
            const price = base * multiple;
            return { multiple, price, marketCap: price * CXMT_SHARES_YI / 10000 };
          }
          const marketCap = base * multiple;
          return { multiple, marketCap, price: marketCap * 10000 / CXMT_SHARES_YI };
        });
      }

      function calculate(item) {
        const fx = Number(inputs.fx.value);
        const premium = Number(inputs.premium.value);
        const current = inputs.current.value.trim() === "" ? NaN : Number(inputs.current.value);
        const usdMarketCap = item.marketCap * 1000 / fx;
        const usdPrice = item.price / fx;
        const target = usdPrice * (1 + premium / 100);
        const actualPremium = Number.isFinite(current) && usdPrice > 0 ? (current / usdPrice - 1) * 100 : NaN;
        return { ...item, usdMarketCap, usdPrice, premium, target, actualPremium };
      }

      function render() {
        body.replaceChildren();
        scenarios().forEach(item => {
          const result = calculate(item);
          const row = document.createElement("tr");
          const actualClass = result.actualPremium < 0 ? "premium-badge discount" : "premium-badge";
          const actualText = Number.isFinite(result.actualPremium)
            ? `${result.actualPremium >= 0 ? "+" : ""}${number(result.actualPremium, 1)}%`
            : "—";
          row.innerHTML = `
            <td class="scenario">${result.multiple}×</td>
            <td><span class="metric">¥ ${number(result.price, 2)}</span></td>
            <td><span class="metric">¥ ${number(result.marketCap, 4)}</span><span class="muted"> 万亿</span></td>
            <td><span class="metric">$ ${number(result.usdMarketCap, 2)}</span><span class="muted"> B</span></td>
            <td><span class="metric">$ ${number(result.usdPrice, 4)}</span></td>
            <td><span class="premium-badge">${number(result.premium, 1)}%</span></td>
            <td><span class="hl-price">$ ${number(result.target, 4)}</span></td>
            <td><span class="${actualClass}">${actualText}</span></td>`;
          body.append(row);
        });
      }

      function updateModeUi() {
        const isPrice = mode === "price";
        baseLabel.textContent = isPrice ? "基准 A 股价格" : "基准市值";
        baseUnit.textContent = isPrice ? "CNY" : "万亿 CNY";
        baseInput.step = isPrice ? "0.01" : "0.0001";
        baseInput.value = inputNumber(isPrice ? basePrice : baseMarketCap);
        matrixFormula.innerHTML = isPrice
          ? "<strong>模式一</strong>情景股价 = 基准 A 股价格 × 2–10 倍"
          : "<strong>模式二</strong>情景市值 = 基准市值 × 2–10 倍";
        modeButtons.forEach(button => {
          const active = button.dataset.mode === mode;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
        });
        render();
      }

      modeButtons.forEach(button => button.addEventListener("click", () => {
        if (button.dataset.mode === mode) return;
        if (mode === "price") {
          basePrice = Number(baseInput.value);
          baseMarketCap = basePrice * CXMT_SHARES_YI / 10000;
        } else {
          baseMarketCap = Number(baseInput.value);
          basePrice = baseMarketCap * 10000 / CXMT_SHARES_YI;
        }
        mode = button.dataset.mode;
        updateModeUi();
      }));

      baseInput.addEventListener("input", () => {
        if (mode === "price") basePrice = Number(baseInput.value);
        else baseMarketCap = Number(baseInput.value);
        render();
      });

      Object.values(inputs).forEach(input => input.addEventListener("input", render));

      document.querySelector("#reset").addEventListener("click", () => {
        mode = "price";
        basePrice = DEFAULT_BASE_PRICE;
        baseMarketCap = DEFAULT_BASE_MARKET_CAP;
        inputs.fx.value = 6.78;
        inputs.premium.value = 10;
        inputs.current.value = "";
        updateModeUi();
      });

      document.querySelector("#export").addEventListener("click", () => {
        const rows = [["倍数", "CXMT A股价格(CNY)", "CXMT市值(万亿CNY)", "美元市值(十亿美元)", "美元折算价(USD)", "全局溢价(%)", "HL对应价(USD)", "HL现价实际溢价(%)"]];
        scenarios().forEach(item => {
          const result = calculate(item);
          rows.push([result.multiple, result.price, result.marketCap, result.usdMarketCap, result.usdPrice, result.premium, result.target, result.actualPremium]);
        });
        const csv = "\ufeff" + rows.map(row => row.join(",")).join("\n");
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
        link.download = `cxmt-hl-${mode === "price" ? "price" : "market-cap"}-matrix.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
      });

      updateModeUi();
    </script>
  </body>
</html>
